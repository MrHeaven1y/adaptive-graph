
<style>
*{margin:0;padding:0;box-sizing:border-box}
.app{display:flex;height:520px;overflow:hidden;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary)}
.sidebar{width:178px;flex-shrink:0;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;padding:14px 10px;gap:3px;overflow-y:auto}
.logo{font-size:17px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono);letter-spacing:-0.5px}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--color-text-tertiary);padding-bottom:10px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:4px;font-family:var(--font-mono)}
.sect{font-size:9px;letter-spacing:2px;color:var(--color-text-tertiary);margin:5px 0 3px;font-family:var(--font-mono)}
.fn-btn{background:transparent;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);font-family:var(--font-mono);font-size:11px;padding:5px 8px;cursor:pointer;text-align:left;transition:background .1s,border-color .1s,color .1s;border-radius:var(--border-radius-md);display:block;width:100%;margin-bottom:2px}
.fn-btn:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary);background:var(--color-background-primary)}
.fn-btn.active{border-color:var(--color-border-primary);color:var(--color-text-primary);background:var(--color-background-primary);font-weight:500}
.sp{flex:1;min-height:6px}
.hints{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);padding:8px;font-size:9px;color:var(--color-text-secondary);line-height:1.9;border-radius:var(--border-radius-md);font-family:var(--font-mono)}
.rb{margin-top:5px;background:transparent;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary);font-family:var(--font-mono);font-size:9px;padding:5px;cursor:pointer;transition:all .1s;border-radius:var(--border-radius-md);width:100%}
.rb:hover{border-color:var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-primary)}
.wrap{flex:1;position:relative;min-width:0;min-height:0}
canvas{display:block;width:100%;height:calc(100% - 26px);cursor:crosshair}
.bar{position:absolute;bottom:0;left:0;right:0;height:26px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 12px;gap:14px;font-size:9px;font-family:var(--font-mono);color:var(--color-text-tertiary)}
.bv{color:var(--color-text-secondary)}
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Interactive graph morphing tool — pick a function, click two points, watch the connecting line transform into the curve</h2>

<div class="app">
  <div class="sidebar">
    <div class="logo">morph</div>
    <div class="logo-sub">graph animator</div>
    <div class="sect">// function</div>
    <div id="fl"></div>
    <div class="sp"></div>
    <div class="hints">
      <strong style="color:var(--color-text-primary)">①</strong> select function<br>
      <strong style="color:var(--color-text-primary)">②</strong> click point A<br>
      <strong style="color:var(--color-text-primary)">③</strong> click point B<br>
      <strong style="color:var(--color-text-primary)">↺</strong> watch it morph
    </div>
    <button class="rb" id="rb">reset [R]</button>
  </div>
  <div class="wrap">
    <canvas id="c"></canvas>
    <div class="bar">
      <span>fn: <span class="bv" id="sf">sin(x)</span></span>
      <span>xy: <span class="bv" id="sxy">—</span></span>
      <span>state: <span class="bv" id="ss">click point A</span></span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const FUNCS = [
  { label: 'sin(x)',    fn: x => Math.sin(x) * 3 },
  { label: 'cos(x)',    fn: x => Math.cos(x) * 3 },
  { label: 'x²',        fn: x => x * x * 0.11 },
  { label: '-x²',       fn: x => -x * x * 0.11 },
  { label: 'x³',        fn: x => x * x * x * 0.015 },
  { label: '|x|',       fn: x => Math.abs(x) * 0.65 },
  { label: 'sgn·√|x|', fn: x => Math.sign(x) * Math.sqrt(Math.abs(x)) * 1.9 },
  { label: 'sigmoid',   fn: x => (1 / (1 + Math.exp(-x * 0.85)) - 0.5) * 8 },
  { label: 'x·sin(x)', fn: x => x * Math.sin(x) * 0.55 },
  { label: 'gaussian',  fn: x => 3.6 * Math.exp(-x * x * 0.11) - 1.8 },
  { label: 'tan(x)',    fn: x => Math.tan(x) },
];

let sel = 0, VIEW = {}, state = 'P1';
let p1 = null, p2 = null, animT = 0, raf = null, mouse = null;

const BG = '#0e1218', GRID = '#181e2c', AXIS = '#243050', TICK = '#2e4060';
const CURVE = '#5DCAA5', CURVE_GLOW = 'rgba(93,202,165,0.45)';
const PT_COL = '#D85A30', PT_GLOW = 'rgba(216,90,48,0.4)';

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const a = W / H, xR = 16;
  VIEW = { xMin:-xR/2, xMax:xR/2, yMin:-xR/(2*a), yMax:xR/(2*a) };
  render();
}

function toS(mx, my) {
  const W = canvas.clientWidth, H = canvas.clientHeight;
  return [(mx-VIEW.xMin)/(VIEW.xMax-VIEW.xMin)*W, (1-(my-VIEW.yMin)/(VIEW.yMax-VIEW.yMin))*H];
}
function toM(sx, sy) {
  const W = canvas.clientWidth, H = canvas.clientHeight;
  return [VIEW.xMin+sx/W*(VIEW.xMax-VIEW.xMin), VIEW.yMin+(1-sy/H)*(VIEW.yMax-VIEW.yMin)];
}
function ease(t) { return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function lineAt(x) {
  if (!p1||!p2) return 0;
  if (Math.abs(p2[0]-p1[0])<1e-9) return (p1[1]+p2[1])/2;
  return p1[1]+(p2[1]-p1[1])/(p2[0]-p1[0])*(x-p1[0]);
}

function drawGrid() {
  const W=canvas.clientWidth, H=canvas.clientHeight;
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=GRID; ctx.lineWidth=1;
  for(let x=Math.ceil(VIEW.xMin);x<=VIEW.xMax;x++){const[sx]=toS(x,0);ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,H);ctx.stroke();}
  for(let y=Math.ceil(VIEW.yMin);y<=VIEW.yMax;y++){const[,sy]=toS(0,y);ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(W,sy);ctx.stroke();}
  const[ox,oy]=toS(0,0);
  ctx.strokeStyle=AXIS; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(W,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();
  ctx.fillStyle=TICK; ctx.font='9px monospace';
  ctx.textAlign='center';
  for(let x=Math.ceil(VIEW.xMin);x<=VIEW.xMax;x++){
    if(x===0)continue; const[sx]=toS(x,0);
    ctx.fillText(x,sx,Math.min(H-4,oy+13));
  }
  ctx.textAlign='right';
  for(let y=Math.ceil(VIEW.yMin);y<=VIEW.yMax;y++){
    if(y===0||y%2!==0)continue; const[,sy]=toS(0,y);
    ctx.fillText(y,Math.max(26,ox-5),sy+3);
  }
}

function computePts() {
  const f=FUNCS[sel].fn, N=450;
  const midX=(p1[0]+p2[0])/2;
  const wR=ease(animT)*(VIEW.xMax-VIEW.xMin)*1.1, bl=1.4;
  const yR=VIEW.yMax-VIEW.yMin;
  const pts=[]; let prevFR=null;
  for(let i=0;i<=N;i++){
    const mx=VIEW.xMin+(i/N)*(VIEW.xMax-VIEW.xMin);
    const fr=f(mx);
    const oor=!isFinite(fr)||Math.abs(fr)>yR*2.2;
    const fy=oor?0:fr;
    const ly=lineAt(mx);
    const lt=Math.max(0,Math.min(1,(wR-Math.abs(mx-midX))/bl));
    const my=ly+ease(lt)*(fy-ly);
    const[sx,sy]=toS(mx,my);
    const bigJump=prevFR!==null&&!oor&&Math.abs(fr-prevFR)>yR*0.4;
    pts.push({sx,sy,oor,bigJump});
    prevFR=oor?null:fr;
  }
  return pts;
}

function strokePts(pts, lw, col, glow) {
  ctx.save(); ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.strokeStyle=col; ctx.shadowBlur=glow; ctx.shadowColor=CURVE_GLOW;
  ctx.beginPath();
  let started=false, pOor=true;
  for(const{sx,sy,oor,bigJump}of pts){
    if(!started||oor||pOor||bigJump) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
    started=true; pOor=oor;
  }
  ctx.stroke(); ctx.restore();
}

function drawWavefront() {
  if(animT<=0||animT>=1)return;
  const midX=(p1[0]+p2[0])/2, wR=ease(animT)*(VIEW.xMax-VIEW.xMin)*1.1;
  const H=canvas.clientHeight;
  for(const s of[-1,1]){
    const wx=midX+s*wR;
    if(wx<VIEW.xMin||wx>VIEW.xMax)continue;
    const[sx]=toS(wx,0);
    ctx.save();
    const g=ctx.createLinearGradient(sx-12,0,sx+12,0);
    g.addColorStop(0,'transparent'); g.addColorStop(0.5,'rgba(93,202,165,0.18)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(sx-12,0,24,H); ctx.restore();
  }
}

function drawPoint(mx, my, label) {
  const[sx,sy]=toS(mx,my), W=canvas.clientWidth, H=canvas.clientHeight;
  ctx.save();
  ctx.strokeStyle='rgba(216,90,48,0.18)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(W,sy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(216,90,48,0.4)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(sx,sy,11,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=PT_COL; ctx.shadowBlur=8; ctx.shadowColor=PT_GLOW;
  ctx.beginPath();ctx.arc(sx,sy,3.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='rgba(216,140,110,0.9)';
  ctx.font='9px monospace'; ctx.textAlign=label==='A'?'left':'right';
  ctx.fillText(`${label}(${mx.toFixed(1)},${my.toFixed(1)})`,sx+(label==='A'?14:-14),sy-11);
  ctx.restore();
}

function drawMouseCursor() {
  if(!mouse||state==='ANIM')return;
  const[sx,sy]=toS(mouse[0],mouse[1]), W=canvas.clientWidth, H=canvas.clientHeight;
  ctx.save();
  ctx.strokeStyle='rgba(216,90,48,0.2)'; ctx.lineWidth=1; ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(W,sy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=PT_COL; ctx.shadowBlur=6; ctx.shadowColor=PT_GLOW;
  ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPreviewLine() {
  if(!p1||!mouse||state!=='P2')return;
  const[sx1,sy1]=toS(p1[0],p1[1]), [sx2,sy2]=toS(mouse[0],mouse[1]);
  ctx.save(); ctx.strokeStyle='rgba(216,90,48,0.38)'; ctx.lineWidth=1.5;
  ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx2,sy2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function render() {
  drawGrid();
  if(state==='P2'||state==='ANIM'||state==='DONE') if(p1) drawPoint(p1[0],p1[1],'A');
  if(state==='ANIM'||state==='DONE') {
    if(p2) drawPoint(p2[0],p2[1],'B');
    drawWavefront();
    const pts=computePts();
    strokePts(pts,2.5,CURVE,11);
    strokePts(pts,1,'rgba(180,240,220,0.55)',0);
  }
  if(state==='P2') drawPreviewLine();
  drawMouseCursor();
}

function doAnim() {
  animT+=0.008; render();
  if(animT<1){ raf=requestAnimationFrame(doAnim); }
  else { animT=1; state='DONE'; render(); document.getElementById('ss').textContent='morphed ✓  (click to restart)'; }
}

function handleTap(cx, cy) {
  const r=canvas.getBoundingClientRect(), [mx,my]=toM(cx-r.left,cy-r.top);
  if(state==='P1'){
    p1=[mx,my]; state='P2';
    document.getElementById('ss').textContent='click point B';
    render();
  } else if(state==='P2'){
    if(Math.abs(mx-p1[0])<0.15&&Math.abs(my-p1[1])<0.15)return;
    p2=[mx,my]; state='ANIM'; animT=0;
    document.getElementById('ss').textContent='morphing...';
    if(raf) cancelAnimationFrame(raf);
    raf=requestAnimationFrame(doAnim);
  } else if(state==='DONE'){
    p1=[mx,my]; p2=null; animT=0; state='P2';
    document.getElementById('ss').textContent='click point B';
    if(raf) cancelAnimationFrame(raf);
    render();
  }
}

canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];handleTap(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse=toM(e.clientX-r.left,e.clientY-r.top);
  document.getElementById('sxy').textContent=`(${mouse[0].toFixed(2)}, ${mouse[1].toFixed(2)})`;
  if(state!=='ANIM') render();
});
canvas.addEventListener('mouseleave',()=>{mouse=null;});

function reset(){
  if(raf) cancelAnimationFrame(raf);
  p1=null;p2=null;animT=0;state='P1';
  document.getElementById('ss').textContent='click point A';
  render();
}

function buildFnList(){
  const el=document.getElementById('fl'); el.innerHTML='';
  FUNCS.forEach((fn,i)=>{
    const btn=document.createElement('button');
    btn.className='fn-btn'+(i===sel?' active':'');
    btn.textContent=fn.label;
    btn.onclick=()=>{ sel=i; document.getElementById('sf').textContent=fn.label; buildFnList(); reset(); };
    el.appendChild(btn);
  });
}

document.getElementById('rb').onclick=reset;
document.addEventListener('keydown',e=>(e.key==='r'||e.key==='R')&&reset());

buildFnList();
window.addEventListener('resize',resize);
resize();
</script>
